<!DOCTYPE html>
<html>
<head>
<title>Links, Tables and Lists</title>
</head>
<body>
<h1>Lists in HTML</h1>
<h2>Ordered List</h2>
<ol>
    <li>Suleman</li>
    <li>Hira</li>
    <li>Ali</li>
</ol>
<h2>Unordered List</h2>
<ul>
    <li>Suleman</li>
    <li>Hira</li>
    <li>Ali</li>
</ul>
<h2>Description List</h2>
<dl>
    <dt>HTML</dt>
    <dd>HyperText Markup Language</dd>
    </dl>
    </body>
</html>
